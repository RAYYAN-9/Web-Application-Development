<html>

<body>
	<form>
		<h1>University Student Registration</h1>
		
		<!-- Text Input -->
		<label for="name">Full Name:</label>
		<input type="text" id="name" name="name" >
		<br>
		<!-- Email Input -->
		<label for="email">Email:</label>
		<input type="email" id="email" name="email" >
		<br>
		<!-- Password Input -->
		<label for="password">Password:</label>
		<input type="password" id="password" name="password" >
		<br>
		<!-- Tel Input -->
		<label for="phone">Phone Number:</label>
		<input type="tel" id="phone" name="phone" >
		<br>
		<!-- URL Input -->
		<label for="website">Personal Website:</label>
		<input type="url" id="website" name="website">
		<br>
		<!-- Date Input -->
		<label for="dob">Date of Birth:</label>
		<input type="date" id="dob" name="dob" >
		<br>
		<!-- Datetime-local Input -->
		<label for="joining_date">Joining Date and Time:</label>
		<input type="datetime-local" id="joining_date" name="joining_date" >
		<br>
		<!-- Month Input -->
		<label for="payment_month">Payment Month:</label>
		<input type="month" id="payment_month" name="payment_month" >
		<br>
		<!-- Week Input -->
		<label for="exam_week">Exam Week:</label>
		<input type="week" id="exam_week" name="exam_week" >
		<br>
		<!-- Time Input -->
		<label for="class_time">Class Time:</label>
		<input type="time" id="class_time" name="class_time" >
		<br>
		<!-- Number Input -->
		<label for="roll_no">Roll Number:</label>
		<input type="number" id="roll_no" name="roll_no" >
		<br>
		<!-- Range Input -->
		<label for="progress">Progress (1-100):</label>
		<input type="range" id="progress" name="progress" min="1" max="100" >
		<br>
		<!-- Color Input -->
		<label for="favorite_color">Favorite Color:</label>
		<input type="color" id="favorite_color" name="favorite_color" >
		<br>
		<!-- Checkbox Input -->
		<label for="hobbies">Hobbies:</label>
		<input type="checkbox" id="reading" name="hobbies[]" value="reading">
		<label for="reading">Reading</label>
		<input type="checkbox" id="coding" name="hobbies[]" value="coding">
		<label for="coding">Coding</label>
		<br>
		<!-- Radio Input -->
		<label for="gender">Gender:</label>
		<input type="radio" id="male" name="gender" value="male" >
		<label for="male">Male</label>
		<input type="radio" id="female" name="gender" value="female">
		<label for="female">Female</label>
		<br>
		<!-- File Input -->
		<label for="document">Upload Document:</label>
		<input type="file" id="document" name="document" >
		<br>
		<!-- Image Input -->
		<label for="profile_picture">Upload Profile Picture:</label>
		<input type="image" id="profile_picture" name="profile_picture" src="upload.png" alt="Upload Profile Picture">
		<br>
		<!-- Button Input -->
		<input type="button" value="Calculate Fees" onclick="alert('Fees calculated successfully!')">
		<br>
        <br>
		<!-- Reset Input -->
		<input type="reset" value="Reset Form">
		
		<!-- Submit Input -->
		 <input type="submit" value="Submit">

         

    </form>
    </body>
</html>
